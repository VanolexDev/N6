<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>N6 - Shorten. Share. Simplify.</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='./styles.css'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Climate+Crisis&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">

    <meta content="N6" property="og:title" />
    <meta content="A lightweight URL shortener for concise, memorable links." property="og:description" />
    <meta content="https://n6.lt/" property="og:url" />
    <meta content="https://n6.lt/favicon.ico" property="og:image" />
    <meta content="#04f489" data-react-helmet="true" name="theme-color" />

</head>
<body>
    <div class="center-content">
        <div class="logo-container">
            <div class="logo">N6</div>
            <div class="slogan">Enter URL to shorten:</div>
        </div>
        <div class="interaction-container">
            <div class="input-container">
                <input class="link-input" id="input" placeholder="Link" maxlength="1000">
                <button class="shorten-button" id="shorten-button" onclick="onShortenButtonClick()">
                    <div class="shorten-text" id="shorten-text" style="display: flex;">Shorten</div>
                    <div class="loader" id="loader" style="display: none;"></div>
                </button>
            </div>
            <div class="margin-buffer">
                <div class="result-container" id="result" style="margin-bottom: -200%;">
                    <div class="ready-container">
                        <div class="ready-message">Your URL is <strong>ready</strong>!</div>
                        <a class="link-hitbox" onclick="copyLink()">
                            <div class="link-container">
                                <div class="link-text" id="link-text"></div>
                                <div class="icon-scroll">
                                    <img src="./copy.svg" id="copy-icon" class="icon">
                                     <img src="./check.svg" class="icon">
                                </div>
                            </div>
                            <div class="copy-scroll">
                                <div id="click-to-copy" class="copy-text">(Click to copy)</div>
                                <div class="copy-text">Copied!</div>
                            </div>
                        </a>
                    </div>
                    <div class="qr-image" id="qr-image"></div>
                </div>
            </div>
        </div>
        
        <div class="error-message" id="error-message">
        </div>
    </div>

    <script src='script.js'></script>
</body>
</html>
